services:

  postgres:
    image: postgres:15-alpine
    container_name: mindful_postgres
    environment:
      POSTGRES_DB: mindful_db
      POSTGRES_USER: mindful
      POSTGRES_PASSWORD: mindful123
    ports:
      - "5432:5432"
    volumes:
      - mindful_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindful -d mindful_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mindful_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  mindful_postgres_data:
