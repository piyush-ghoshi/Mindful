# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/mindful_db
spring.datasource.username=mindful
spring.datasource.password=mindful123
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# validate: Hibernate checks schema matches entities — fails fast on mismatch
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.open-in-view=false

# ── Connection Pool ────────────────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=mindful-wellness-super-secret-key-change-in-production-must-be-at-least-256-bits
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ── CORS ──────────────────────────────────────────────────────────────────────
security.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174

# ── Mail (disabled for dev) ───────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@mindfulwellness.com
app.mail.enabled=false
app.notification.max-retries=3

# ── Groq AI (MindBot) ─────────────────────────────────────────────────────────
groq.api.key=${GROQ_API_KEY:gsk_y5eQW5o3Nfwq8s2rU}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama-3.1-8b-instant
groq.api.max-tokens=1024

# ── Firebase ──────────────────────────────────────────────────────────────────
firebase.credentials.path=classpath:mindful-54fd2-firebase-adminsdk-fbsvc-2e613fd09a.json

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.mindful=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.flywaydb=INFO
logging.level.org.springframework.web.servlet=DEBUG

# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=mindful-wellness-platform

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
