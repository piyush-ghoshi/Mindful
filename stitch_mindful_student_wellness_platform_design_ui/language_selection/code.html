<img alt="Diverse group of students sitting together in a bright, calm setting" class="absolute inset-0 w-full h-full object-cover opacity-80 mix-blend-luminosity" data-alt="Soft watercolor illustration style image of diverse college students sitting together on campus steps, gentle lighting, calm and supportive atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDiODLJUbl_vBEEjOZQX4rJ9QKointIBw95Pi_11lvDarl1aUg_pigLGPXmFlsIdkPMu6z8Gw5fKK8vT23INHmmlxhFG3Ivro4-QDkSe4hPkNMcVVUPalNydOCC6B5hzrYkZ_ioyGBoXHKu0iubouM0JUxl33QU8tOvx6hOJjKnNjKE9JlVvmSw62l-U5gDAgAtuRtSCKWILtAYPW74fvDsUyl_nCB-vCHvRVgPyB-zqaEc9daDX8Ef1olMw5MS-OKkOtSweCHSVjc"/>
</div>
<!-- Right Column: Form -->
<div class="w-full md:w-1/2 p-8 md:p-margin-lg flex flex-col justify-center">
<!-- Minimal Brand Header for Transactional Flow -->
<div class="mb-12">
<span class="font-headline-md text-headline-md text-primary">Mindful</span>
</div>
<!-- Step Indicator -->
<div class="font-label-md text-label-md text-primary mb-2">Step 1 of 3</div>
<!-- Heading & Subtitle -->
<h1 class="font-headline-lg text-headline-lg text-on-background mb-2">Choose Your Language</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-10">Select your preferred language to continue</p>
<!-- Language Grid -->
<div class="grid grid-cols-2 gap-4 mb-10">
<!-- Selected Card: English -->
<div class="border-2 border-primary bg-secondary-container rounded-lg p-5 flex flex-col items-center justify-center relative cursor-pointer transition-colors">
<span class="material-symbols-outlined absolute top-3 right-3 text-primary text-xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-body-md text-body-md text-on-background font-semibold mb-1">English</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">English</span>
</div>
<!-- Unselected Card: Hindi -->
<div class="border border-outline-variant bg-surface-container-lowest hover:border-primary-container hover:bg-surface rounded-lg p-5 flex flex-col items-center justify-center cursor-pointer transition-colors">
<span class="font-body-md text-body-md text-on-background font-semibold mb-1">Hindi</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">हिन्दी</span>
</div>
<!-- Unselected Card: Tamil -->
<div class="border border-outline-variant bg-surface-container-lowest hover:border-primary-container hover:bg-surface rounded-lg p-5 flex flex-col items-center justify-center cursor-pointer transition-colors">
<span class="font-body-md text-body-md text-on-background font-semibold mb-1">Tamil</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">தமிழ்</span>
</div>
<!-- Unselected Card: Telugu -->
<div class="border border-outline-variant bg-surface-container-lowest hover:border-primary-container hover:bg-surface rounded-lg p-5 flex flex-col items-center justify-center cursor-pointer transition-colors">
<span class="font-body-md text-body-md text-on-background font-semibold mb-1">Telugu</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">తెలుగు</span>
</div>
<!-- Unselected Card: Kannada -->
<div class="border border-outline-variant bg-surface-container-lowest hover:border-primary-container hover:bg-surface rounded-lg p-5 flex flex-col items-center justify-center cursor-pointer transition-colors">
<span class="font-body-md text-body-md text-on-background font-semibold mb-1">Kannada</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">ಕನ್ನಡ</span>
</div>
<!-- Unselected Card: Malayalam -->
<div class="border border-outline-variant bg-surface-container-lowest hover:border-primary-container hover:bg-surface rounded-lg p-5 flex flex-col items-center justify-center cursor-pointer transition-colors">
<span class="font-body-md text-body-md text-on-background font-semibold mb-1">Malayalam</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">മലയാളം</span>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary text-on-primary py-4 rounded-lg font-label-md text-label-md hover:bg-surface-tint transition-colors mt-auto flex items-center justify-center gap-2">
                Continue
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</div>

<button aria-label="Emergency SOS" class="fixed bottom-8 right-8 w-16 h-16 bg-error text-on-error rounded-full shadow-lg flex items-center justify-center hover:opacity-90 transition-opacity z-50 focus:ring-4 focus:ring-error-container outline-none">
<span class="font-label-md text-label-md font-bold tracking-widest">SOS</span>
