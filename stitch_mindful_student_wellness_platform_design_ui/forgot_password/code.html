<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col relative overflow-x-hidden">
<!-- TopNavBar -->
<header class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-md text-teal-600 dark:text-teal-400 font-['Inter'] antialiased docked full-width top-0 border-b border-slate-100 dark:border-slate-800 shadow-sm fixed top-0 w-full z-50 flex justify-between items-center px-8 h-20 max-w-[1440px] mx-auto left-0 right-0">
<div class="flex items-center gap-4 cursor-pointer active:opacity-80">
<span class="text-2xl font-bold tracking-tight text-teal-600 dark:text-teal-400">Mindful</span>
</div>
<nav class="hidden md:flex items-center gap-8">
<a class="text-slate-600 dark:text-slate-400 hover:text-teal-500 transition-colors font-body-md text-body-md hover:bg-slate-50 dark:hover:bg-slate-800 transition-all duration-200 px-3 py-2 rounded-md" href="#">Resources</a>
<a class="text-slate-600 dark:text-slate-400 hover:text-teal-500 transition-colors font-body-md text-body-md hover:bg-slate-50 dark:hover:bg-slate-800 transition-all duration-200 px-3 py-2 rounded-md" href="#">Journal</a>
<a class="text-slate-600 dark:text-slate-400 hover:text-teal-500 transition-colors font-body-md text-body-md hover:bg-slate-50 dark:hover:bg-slate-800 transition-all duration-200 px-3 py-2 rounded-md" href="#">Community</a>
<a class="text-slate-600 dark:text-slate-400 hover:text-teal-500 transition-colors font-body-md text-body-md hover:bg-slate-50 dark:hover:bg-slate-800 transition-all duration-200 px-3 py-2 rounded-md" href="#">Support</a>
</nav>
<div class="flex items-center gap-4">
<button class="font-label-md text-label-md text-primary hover:bg-slate-50 dark:hover:bg-slate-800 transition-all duration-200 px-4 py-2 rounded-lg cursor-pointer active:opacity-80 hidden md:block">Log In</button>
<button class="font-label-md text-label-md bg-primary-container text-on-primary px-5 py-2.5 rounded-lg hover:opacity-90 transition-opacity cursor-pointer active:opacity-80 hidden md:block">Get Started</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center p-gutter mt-20">
<!-- Centered Card -->
<div class="w-full max-w-[480px] bg-surface-container-lowest rounded-xl shadow-[0_2px_10px_rgba(8,27,57,0.03)] p-10 flex flex-col items-center text-center">
<!-- Logo inside card (optional but requested) -->
<div class="mb-8">
<span class="text-2xl font-bold tracking-tight text-primary">Mindful</span>
</div>
<!-- Envelope Illustration -->
<div class="mb-6 w-24 h-24 rounded-full bg-surface-container-low flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 0;">mail</span>
</div>
<!-- Heading & Description -->
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-3">Reset Your Password</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-8 px-4">
                Enter your registered email address and we'll send you a password reset link.
            </p>
<!-- Form -->
<form action="#" class="w-full flex flex-col gap-6">
<div class="flex flex-col text-left gap-2">
<label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<input class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
<button class="w-full py-3.5 px-4 bg-primary-container text-on-primary font-label-md text-label-md rounded-lg hover:bg-primary transition-colors mt-2 shadow-sm" type="submit">
                    Send Reset Link
                </button>
</form>
<!-- Back to Login Link -->
<a class="mt-8 font-body-md text-body-md text-primary hover:text-surface-tint hover:underline flex items-center gap-2 transition-colors" href="#">
<span class="material-symbols-outlined text-sm">arrow_back</span>
                Back to Login
            </a>
</div>
</main>
<!-- Floating SOS Button -->
<button class="fixed bottom-8 right-8 w-16 h-16 bg-error text-on-error rounded-full shadow-[0_4px_14px_rgba(186,26,26,0.3)] flex items-center justify-center hover:bg-[#a61717] hover:-translate-y-1 transition-all duration-300 z-50 group">
<span class="material-symbols-outlined text-3xl group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">sos</span>
